<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <title>Aram Heatmap 🔥</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
      /* تنسيق أولي لمنع الوميض الأبيض عند التحميل */
      body {
        margin: 0;
        background-color: #000000;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      }
      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <noscript>تحتاج إلى تفعيل JavaScript لتشغيل هذا التطبيق.</noscript>
    
    <div id="root"></div>

    <script>
      // إخبار تليجرام أن التطبيق جاهز فور تحميل الصفحة
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand(); // جعل التطبيق يملأ الشاشة فوراً
      }
    </script>
  </body>
</html>
